[pytest]
# --cov=module_4/src        → measure coverage over everything in src/
# --cov-report=term-missing → print uncovered line numbers in the terminal
# --cov-fail-under=100      → the test run fails if coverage drops below 100%
# -q                        → quiet mode (less clutter, just results)
addopts = -q --cov=src --cov-report=term-missing --cov-fail-under=100

# Every marker used in the test suite must be declared here.
# pytest warns (and with --strict-markers, errors) on unknown markers.
markers =
    web: Flask route / page rendering tests
    buttons: Pull Data and Update Analysis endpoint behavior
    analysis: formatting and rounding of analysis output
    db: database schema / inserts / selects
    integration: end-to-end flows (pull → update → render)
