[pytest]
# Coverage is measured over the whole src/ tree (all four services' Python) and
# the run fails below 100%. term-missing prints any uncovered line numbers.
addopts = -q --cov=src --cov-report=term-missing --cov-fail-under=100

# Markers used across the suite (declared so --strict-markers stays happy).
markers =
    db: schema / loader / watermark behaviour
    publisher: RabbitMQ publisher (web tier)
    consumer: RabbitMQ consumer + dispatch/ack/nack
    etl: incremental scraper + analytics recompute
    web: Flask routes and rendering
    integration: end-to-end publish → consume → render flows
